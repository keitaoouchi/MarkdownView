name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webassets:
    name: WebAssets (Build / Test / Lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webassets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webassets/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm test

  swift:
    name: Swift (Lint / Test)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint autocorrect
        run: swiftlint --fix --config .swiftlint-ci.yml

      - name: SwiftLint (relaxed)
        run: swiftlint lint --config .swiftlint-ci.yml

      - name: Run tests if available (fallback to build)
        run: |
          if rg -q "<TestableReference" MarkdownView.xcodeproj/xcshareddata/xcschemes/MarkdownView.xcscheme; then
            xcodebuild test \
              -project MarkdownView.xcodeproj \
              -scheme MarkdownView \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "No testable entries in MarkdownView scheme. Running build instead."
            xcodebuild build \
              -project MarkdownView.xcodeproj \
              -scheme MarkdownView \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              CODE_SIGNING_ALLOWED=NO
          fi

  example-snapshot:
    name: Example (Snapshot Testing)
    runs-on: macos-15
    needs: swift
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd Example
          pod install

      - name: Run snapshot tests when target exists
        run: |
          if rg -q "ExampleSnapshotTests" Example/Example.xcodeproj/project.pbxproj; then
            xcodebuild test \
              -workspace Example/Example.xcworkspace \
              -scheme Example \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              -only-testing:ExampleSnapshotTests \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "ExampleSnapshotTests target was not found. Skipping snapshot tests."
          fi
