name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webassets:
    name: WebAssets (Build / Test / Lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webassets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webassets/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm test

  swift:
    name: Swift (Test / Lint)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Lint (SwiftLint)
        run: |
          brew install swiftlint
          swiftlint lint --strict

      - name: Test
        run: |
          xcodebuild test \
            -project MarkdownView.xcodeproj \
            -scheme MarkdownView \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO

  example-snapshot:
    name: Example (Snapshot Testing)
    runs-on: macos-15
    needs: swift
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd Example
          pod install

      - name: Run snapshot tests
        run: |
          xcodebuild test \
            -workspace Example/Example.xcworkspace \
            -scheme Example \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:ExampleSnapshotTests \
            CODE_SIGNING_ALLOWED=NO
